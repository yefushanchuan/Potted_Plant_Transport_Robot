###############cloud preprocess############
lidar_type: "livox"        #雷达类型: "livox" 或 "rs16"
filter_leaf_size: 0.4      #输入定位系统的点云体素滤波体素大小
min_range: 0.6             #建图盲区blind用的就是0.6，相当于球面过滤的半径0.6米
max_range: 30.0
N_SCANS: 4

limit_angle_min: -180.0
limit_angle_max: 180.0

#surf_threshold: 0.1

lidar_topic: "/livox/lidar"        #激光雷达话题

pub_cloud_topic: "/deskew_cloud"              #去畸变点云话题

###############cloud preprocess############

###################location################
use_reloc: true                               #是否使用重定位
imu_scale: 9.81                               #IMU加速度计比例因子
reloc_threshold: 0.55                         #重定位阈值
map_filtr_leaf_size: 0.3                      #定位线程使用的全局地图滤波体素大小，使用配p2picp算法不能太大，不然拟合平面内找不到邻域点（p2picp 0.3,ndt 0.5）
enable_undistort: true                        #是否启用点云去畸变功能（使用IMU进行运动补偿）

map_frame    : "map"                          #发布定位系统tf发布所需的坐标系
odom_frame   : "odom"                          #里程计坐标系（用于 Nav2 导航）
base_frame   : "base_footprint"                #机器人坐标系（用于 Nav2 导航）

# TF 发布模式：
#   enable_map_odom_tf: true  -> 发布 map→odom TF（需要 diff_drive_controller 发布 odom→base_footprint）
# enable_map_odom_tf: false # -> 直接发布 map→base_footprint TF（不使用里程计）
enable_map_odom_tf: true                       #启用 map→odom TF 发布（用于 Nav2 导航）

# 发布前位姿重估（仅用于发布链路，抑制定位侧 map->odom 抖动）
pose_refine_enable: true
pose_refine_force_accept_reloc: true           # 重定位成功后允许一次大跳变直接接入
pose_refine_gate_xy_m: 0.25
pose_refine_gate_yaw_rad: 0.35
pose_refine_k_xy_move: 0.25
pose_refine_k_yaw_move: 0.20
pose_refine_k_xy_static: 0.15
pose_refine_k_yaw_static: 0.10
pose_refine_static_v_th: 0.03
pose_refine_static_w_th: 0.05
pose_refine_tf_lookup_timeout_sec: 0.08

lidar2base_x: 0.084                           #lidar2base transform，单位米
lidar2base_y: -0.241
lidar2base_z: 0.2475
lidar2base_roll: 0.0                          #单位弧度
lidar2base_pitch: 0.785398                    #对应xacro中的 M_PI/4 (即45度)
lidar2base_yaw: 0.0

imu2base_x: -0.493                            #imu2base transform，单位米
imu2base_y: 0.00
imu2base_z: 0.1575
imu2base_roll: 0.0                            #单位弧度
imu2base_pitch: 0.0
imu2base_yaw: 0.0

init_x: 0.0                                   #定位系统输入的初始化位姿
init_y: 0.0
init_z: 0.0
init_roll: 0.0
init_pitch: 0.0
init_yaw: 0.0

map_pub_topic: "/pcd_map"                      #发布全局pcd点云地图话题数据

# imu_topic: "/livox/imu"                      #IMU话题
imu_topic: "/imu"                              #IMU话题
cmd_topic: "/loc_cmd"                          #定位指令话题
init_pose_topic: "/initialpose"                # 初始位姿话题

#pub_odom_topic: "/agv_odom"                   #里程计话题
pose_pub_topic: "/agv_pose"                    #发布定位位姿话题数据,这里的位姿是基于base_link的位姿（注意不是基于laser_link的位姿）


#p2pl_icp location
plane_threshold: 0.3     #0.4 构建的平面点与当前位姿邻域点的阈值，说白了就是判断当前点是否在平面内
opt_correspondences_threshold_normal: 0.3 #0.4
opt_correspondences_threshold_relocation: 2.0
opt_max_iteration: 5 #匹配迭代次数
thread_num: 4  #13代英特尔酷睿i7-13650HX处理器共有 14核20线程，用的时候尽量用物理性能核，这里就设置成2,程序里大概有五个地方使用了并行计算
#具体配置如下：性能核（P核）：6个，支持超线程（每个核心2线程），共12线程。能效核（E核）：8个，不支持超线程（每个核心1线程），共8线程。


#ndt location
ndt_max_iteration: 3 #最大迭代次数
ndt_voxel_size: 0.5 #体素大小 #0.5 好像1.0最优
ndt_min_effective_pts: 10 #最近邻点数阈值
ndt_min_pts_in_voxel: 3 #每个栅格中最小点数 default：3
ndt_eps: 0.01 #收敛判定条件  #0.01
ndt_res_outlier_th: 20.0 #异常值拒绝阈值
ndt_remove_centroid: false #是否计算两个点云中心并移除中心？
ndt_nearby_type: 0 #临近栅格模式 0： 只有本栅格 | 1：附近六个栅格
ndt_thread_num: 4
map_grid_resoltion: 30.0


###################location################
