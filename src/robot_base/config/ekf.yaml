ekf_filter_node:
    ros__parameters:
        # ========== 基本参数设置 ==========
        frequency: 50.0  
        two_d_mode: true  
        publish_acceleration: false 
        publish_tf: true 
        # ========== 坐标系定义 ==========
        map_frame: map              
        odom_frame: odom           
        base_link_frame: base_footprint  
        world_frame: odom          

        # ========== 里程计传感器配置 ==========
        odom0: /diff_drive_controller/odom 
        odom0_config: [false, false, false,   # 位置: 忽略
                       false, false, false,   # 姿态: 忽略yaw,roll,pitch
                       true,  false, false,   # 线速度: 使用vx,忽略vy,vz
                       false, false, false,   # 角速度: 忽略wx,wy,wz
                       false, false, false]   # 加速度: 全部忽略
        odom0_relative: false
        odom0_queue_size: 10
        odom0_differential: false  

        # ========== IMU传感器配置 ==========
        imu0: /imu  

        imu0_config: [false, false, false,    # 位置: IMU不提供位置信息
                      false, false, false,    # 姿态: 忽略
                      false, false, false,    # 线速度: IMU不直接提供线速度
                      false, false, true,     # 角速度: 使用yaw角速度
                      false, false, false]    # 加速度: 完全禁用

        imu0_differential: false  
        imu0_relative: false      
        imu0_queue_size: 10       
        imu0_remove_gravitational_acceleration: true  

        # ========== 过程噪声协方差矩阵 ==========
