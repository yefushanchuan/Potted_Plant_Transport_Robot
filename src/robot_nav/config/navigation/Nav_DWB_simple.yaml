# =======================================================================
# 2. 控制器服务器（DWB）
# =======================================================================
controller_server:
  ros__parameters:
    use_sim_time: false                     # 是否使用模拟时间，仿真环境需设为 true
    odom_topic: odom                        # 控制器订阅的里程计话题
    controller_frequency: 10.0              # 控制循环频率（Hz），越高越平滑
    min_x_velocity_threshold: 0.001         # 判定线速度为零的阈值
    min_y_velocity_threshold: 0.0           # 差动底盘无侧向速度
    min_theta_velocity_threshold: 0.01     # 判定角速度为零的阈值
    failure_tolerance: 0.1                  # 允许的控制误差，超出则视为失败
    progress_checker_plugins: ["progress_checker"]   # 进度检测插件列表
    goal_checker_plugins: ["goal_checker"]           # 目标检测插件列表
    controller_plugins: ["FollowPath"]              # 可用控制器

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"  # 进度检测器类
      required_movement_radius: 0.5                      # 要求的最小移动距离
      movement_time_allowance: 10.0                      # 在多长时间不动判定失败

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"      # 目标检测器类
      xy_goal_tolerance: 0.08                            # 平面位置容忍
      yaw_goal_tolerance: 0.04                           # 朝向容忍
      stateful: true                                     # 是否累计状态

    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"   # 旋转补偿控制器
      primary_controller: "dwb_core::DWBLocalPlanner"                   # 具体执行 DWB

      # ---------- RotationShim 关键修复 ----------
      angular_dist_threshold: 0.785         # 触发旋转补偿的角度阈值
      angular_disengage_threshold: 0.3925     # 退出旋转补偿的角度阈值
      forward_sampling_distance: 0.35        # 旋转期间前向采样距离
      rotate_to_heading_angular_vel: 0.5     # 旋转补偿角速度
      max_angular_accel: 0.5                 # 旋转补偿角加速度
      simulate_ahead_time: 1.0               # 旋转补偿模拟时长
      rotate_to_goal_heading: True          # 是否旋转至目标朝向
      # ------------------------------------------

      # ---------- DWB 参数 ----------
      debug_trajectory_details: False        # 是否输出轨迹调试信息
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist", "PreferForward"]  # 启用的评分器

      min_vel_x: 0.0                         # 最小前向速度
      max_vel_x: 0.50                        # 最大前向速度
      max_vel_theta: 0.5                    # 最大角速度
      min_vel_theta: -0.5                  # 最小角速度
      min_speed_xy: 0.0                     # 平面速度下限
      max_speed_xy: 0.5                     # 平面速度上限

      acc_lim_x: 0.5                        # 线速度加速度极限
      acc_lim_y: 0.0                        # 侧向加速度极限
      acc_lim_theta: 0.8                    # 角速度加速度极限
      decel_lim_x: -0.8                     # 线速度减速度极限
      decel_lim_y: 0.0                      # 侧向减速度极限
      decel_lim_theta: -0.8                 # 角速度减速度极限

      vx_samples: 40                        # X 方向采样速度数
      vy_samples: 0                         # Y 方向采样速度数
      vtheta_samples: 40                    # 角速度采样速度数
      sim_time: 2.0                         # 轨迹模拟时长
      linear_granularity: 0.05              # 线速度积分粒度
      angular_granularity: 0.025            # 角速度积分粒度
      transform_tolerance: 0.1              # TF 容忍时间
      xy_goal_tolerance: 0.08               # 平面目标容忍
      trans_stopped_velocity: 0.02          # 认定停止的速度阈值
      short_circuit_trajectory_evaluation: true  # 找到优解即提前结束评估
      stateful: true                        # 使用上一周期状态

      BaseObstacle.scale: 0.8              # 障碍物代价权重
      PathAlign.scale: 80.0                 # 贴合路径权重
      PathAlign.forward_point_distance: 0.24  # 路径前探距离
      PathDist.scale: 1.0                  # 路径距离权重
      GoalAlign.scale: 20.0                 # 对齐目标方向权重
      GoalAlign.forward_point_distance: 0.2   # 目标前探距离
      GoalDist.scale: 10.0                  # 到目标距离权重
      RotateToGoal.scale: 60.0              # 末端旋转权重
      RotateToGoal.slowing_factor: 5.0      # 接近目标减速因子
      RotateToGoal.lookahead_time: 1.7      # 预测时间
      Oscillation.scale: 1.0                # 抑制振荡权重
      Oscillation.oscillation_reset_dist: 0.2   # 解除振荡的距离
      Oscillation.oscillation_reset_angle: 0.2  # 解除振荡的角度
      Oscillation.oscillation_reset_time: 2.0   # 解除振荡的时间
      PreferForward.scale: 0.6              # 偏好前进的权重
      PreferForward.penalty: 0.01           # 倒车惩罚

      include_last_point: true              # 将终点加入跟踪序列
      prune_plan: true                      # 裁剪已经通过的路径
      prune_distance: 1.0                   # 裁剪距离
      discretize_by_time: false             # 是否按时间离散轨迹
      time_granularity: 0.2                 # 时间离散粒度
      restore_defaults: false               # 是否重置为默认

# =======================================================================
# 3. 局部代价地图
# =======================================================================
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 15.0
      global_frame: odom
      robot_base_frame: base_footprint
      transform_timeout: 1.0
      tf_buffer_duration: 10.0
      use_sim_time: false
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.03
      footprint: "[[0.34,0.26],[0.34,-0.26],[-0.34,-0.26],[-0.34,0.26]]"
      plugins: ["static_layer","obstacle_layer","inflation_layer"]
      filters: ["keepout_filter","inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        footprint_clearing_enabled: true
        combination_method: 1
        scan:
          topic: /scan
          max_obstacle_height: 0.5
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        cost_scaling_factor: 1.0
        inflation_radius: 0.22
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: True
        filter_info_topic: "/costmap_filter_info"
        mask_topic: "/keepout_filter_mask"
        transform_tolerance: 0.1
        override_lethal_cost: True
        lethal_override_cost: 200
      always_send_full_costmap: true

# =======================================================================
# 4. 全局代价地图
# =======================================================================
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 10.0
      global_frame: map
      robot_base_frame: base_footprint
      transform_timeout: 1.0
      tf_buffer_duration: 10.0
      use_sim_time: false
      footprint: "[[0.34,0.26],[0.34,-0.26],[-0.34,-0.26],[-0.34,0.26]]"
      resolution: 0.03
      track_unknown_space: false
      plugins: ["static_layer","obstacle_layer","inflation_layer"]
      filters: ["keepout_filter","inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 0.5
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        cost_scaling_factor: 5.0
        inflation_radius: 0.4

      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: True
        filter_info_topic: "/costmap_filter_info"
        mask_topic: "/keepout_filter_mask"
        transform_tolerance: 0.1
        override_lethal_cost: True
        lethal_override_cost: 200
      always_send_full_costmap: true

# =======================================================================
# 5. 地图服务器
# =======================================================================
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

# =======================================================================
# 6. 规划器服务器
# =======================================================================
planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.1
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: false
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      motion_model_for_search: "MOORE"
      angle_quantization_bins: 72
      cost_penalty: 1.5
      use_final_approach_orientation: false
      smooth_path: true

# =======================================================================
# 7. 路径平滑器服务器
# =======================================================================
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# =======================================================================
# 8. 行为服务器
# =======================================================================
behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin","backup","drive_on_heading","wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.4
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.3
    min_rotational_vel: 0.2
    rotational_acc_lim: 0.3

# =======================================================================
# 9. 路径点跟随器
# =======================================================================
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 2000

# =======================================================================
# 10. 速度平滑器
# =======================================================================
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 40.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 0.25]
    min_velocity: [0.0, 0.0, -0.25]
    max_accel: [0.8, 0.0, 0.5]
    max_decel: [-0.8, 0.0, -0.5]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0


#=================================================================
#12.costmap_filter_info_server
#=================================================================
costmap_filter_info_server:
  ros__parameters:
    type: 0
    filter_info_topic: "/costmap_filter_info"
    mask_topic: "/keepout_filter_mask"
    base: 0.0
    multiplier: 1.0
