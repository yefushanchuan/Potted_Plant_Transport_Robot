    default_server_timeout: 30

    default_nav_to_pose_bt_xml: "/home/user/test_ws/route_grapher_nav/src/robot_test/config/navigation/nav_to_pose_w_route_tree.xml"
    # default_nav_through_poses_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"

    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_is_battery_charging_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - robot_route_are_poses_near_bt_node
      - robot_route_compute_route_bt_node
      - robot_route_get_current_pose_bt_node
      - robot_route_concatenate_paths_bt_node
      - nav2_get_pose_from_path_action_bt_node

# =======================================================================
# 2. 控制器服务器（RPP）
# =======================================================================
controller_server:
  ros__parameters:
    use_sim_time: false                     # 是否使用模拟时间，仿真环境需设为 true
    odom_topic: odom                        # 控制器订阅的里程计话题
    controller_frequency: 20.0              # 控制循环频率（Hz），越高越平滑
    min_x_velocity_threshold: 0.001         # 判定线速度为零的阈值
    min_y_velocity_threshold: 0.0           # 差动底盘无侧向速度
    min_theta_velocity_threshold: 0.05     # 判定角速度为零的阈值
    failure_tolerance: 0.1                  # 允许的控制误差，超出则视为失败
    progress_checker_plugins: ["progress_checker"]   # 进度检测插件列表
    goal_checker_plugins: ["goal_checker"]           # 目标检测插件列表
    controller_plugins: ["FollowPath"]              # 可用控制器

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"  # 进度检测器类
      required_movement_radius: 0.05                      # 要求的最小移动距离
      movement_time_allowance: 10.0                      # 在多长时间不动判定失败

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"      # 目标检测器类
      xy_goal_tolerance: 0.14                            # 平面位置容忍
      yaw_goal_tolerance: 0.10                           # 朝向容忍
      stateful: true                                     # 是否累计状态

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      desired_linear_vel: 0.4                 # 期望巡航线速度(m/s)

      lookahead_dist: 0.32                     # 固定前视距离(m)，未启用速度缩放时使用
      min_lookahead_dist: 0.3                 # 速度缩放前视距离下限(m)
      max_lookahead_dist: 1.2                 # 速度缩放前视距离上限(m)
      lookahead_time: 1.5                     # 速度缩放前视时间(s)，约等于 v*lookahead_time
      use_velocity_scaled_lookahead_dist: true # 是否按速度缩放前视距离

      transform_tolerance: 0.2                # TF 查询容忍(s)

      use_rotate_to_heading: true             # 起步/大偏航误差时优先原地转向对齐
      rotate_to_heading_angular_vel: 1.6      # 转向对齐角速度(rad/s)
      rotate_to_heading_min_angle: 0.785      # 触发转向对齐的最小偏航误差(rad)
      max_angular_accel: 0.8                  # 角加速度限制(rad/s^2)
      allow_reversing: false                  # 是否允许倒车(与 use_rotate_to_heading 互斥，避免同时开启)

      use_collision_detection: true           # 是否启用前视弧线碰撞检测
      max_allowed_time_to_collision_up_to_carrot: 1.0 # 允许的最小 TTC 阈值(s)，过小则降速/停止更保守

      use_regulated_linear_velocity_scaling: true # 是否按曲率/转弯半径调节线速度
      regulated_linear_scaling_min_radius: 2.0 # 开始调速的最小转弯半径(m)，越小越“敢拐”
      regulated_linear_scaling_min_speed: 0.1 # 调速后允许的最小线速度(m/s)

      use_cost_regulated_linear_velocity_scaling: true # 是否按代价地图(靠近障碍)调节线速度
      cost_scaling_dist: 0.8                # 距离障碍的调速距离尺度(m)
      cost_scaling_gain: 3.0                # 代价调速增益(越大越保守)
      inflation_cost_scaling_factor: 1.0    # 与 inflation layer 的 cost_scaling_factor 对应(>0)

      min_approach_linear_velocity: 0.05      # 接近终点时最小线速度(m/s)，避免“爬行到停不下来”
      approach_velocity_scaling_dist: 0.4     # 进入终点减速的距离(m)

      max_robot_pose_search_dist: 10.0        # 在路径上搜索最近点的最大距离(m)
      use_interpolation: true                 # 是否对路径点做插值(更平滑，但对路径质量更敏感)

# =======================================================================
# 3. 局部代价地图
# =======================================================================
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_footprint
      transform_tolerance: 0.2  # 增加容差以处理点云处理延迟
      transform_timeout: 1.0
      tf_buffer_duration: 10.0
      use_sim_time: false
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.03
      footprint: "[[0.26,0.14],[0.26,-0.14],[-0.26,-0.14],[-0.26,0.14]]"
      plugins: ["static_layer","obstacle_layer","inflation_layer"]
      filters: ["keepout_filter","inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        footprint_clearing_enabled: true
        combination_method: 1
        scan:
          topic: /scan
          max_obstacle_height: 0.5
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        cost_scaling_factor: 1.0
        inflation_radius: 0.22
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: True
        filter_info_topic: "/costmap_filter_info"
        mask_topic: "/keepout_filter_mask"
        transform_tolerance: 0.1
        override_lethal_cost: True
        lethal_override_cost: 200
      always_send_full_costmap: true

# =======================================================================
# 4. 全局代价地图
# =======================================================================
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 10.0
      global_frame: map
      robot_base_frame: base_footprint
      transform_tolerance: 0.2  # 增加容差以处理点云处理延迟
      transform_timeout: 1.0
      tf_buffer_duration: 10.0
      use_sim_time: false
      footprint: "[[0.26,0.14],[0.26,-0.14],[-0.26,-0.14],[-0.26,0.14]]"
      resolution: 0.03
      track_unknown_space: false
      plugins: ["static_layer","obstacle_layer","inflation_layer"]
      filters: ["keepout_filter","inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 0.5
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        cost_scaling_factor: 5.0
        inflation_radius: 0.4
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: True
        filter_info_topic: "/costmap_filter_info"
        mask_topic: "/keepout_filter_mask"
        transform_tolerance: 0.1
        override_lethal_cost: True
        lethal_override_cost: 200
      always_send_full_costmap: true

# =======================================================================
# 5. 地图服务器
# =======================================================================
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

# =======================================================================
# 6. 规划器服务器
# =======================================================================
planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.1
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: false
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      motion_model_for_search: "MOORE"
      angle_quantization_bins: 72
      cost_penalty: 1.5
      use_final_approach_orientation: false
      smooth_path: true

# =======================================================================
# 7. 路径平滑器服务器
# =======================================================================
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-4
      max_its: 50
      do_refinement: false

# =======================================================================
# 8. 行为服务器
# =======================================================================
behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin","backup","drive_on_heading","wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    # 让恢复动作的速度变化更平滑，避免“突然冲一下/突然刹住”的抖动
    # DriveOnHeading/BackUp 均继承同一实现，会读取各自名字空间下的限制参数：
    drive_on_heading.acceleration_limit: 0.6
    drive_on_heading.deceleration_limit: -0.8
    drive_on_heading.minimum_speed: 0.05
    backup.acceleration_limit: 0.6
    backup.deceleration_limit: -0.8
    backup.minimum_speed: 0.05
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.2
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.3
    min_rotational_vel: 0.2
    rotational_acc_lim: 0.3

# =======================================================================
# 9. 路径点跟随器
# =======================================================================
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 2000

# =======================================================================
# 10. 速度平滑器
# =======================================================================
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 40.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.6, 0.0, 0.6]
    # 允许后退：否则 Nav2 的 BackUp 恢复动作会被速度平滑器钳制为 0，导致一直超时失败
    min_velocity: [-0.25, 0.0, -0.6]
    max_accel: [0.8, 0.0, 0.8]
    max_decel: [-0.8, 0.0, -0.8]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0


#=================================================================
#12.costmap_filter_info_server
#=================================================================
costmap_filter_info_server:
  ros__parameters:
    type: 0
    filter_info_topic: "/costmap_filter_info"
    mask_topic: "/keepout_filter_mask"
    base: 0.0
    multiplier: 1.0
